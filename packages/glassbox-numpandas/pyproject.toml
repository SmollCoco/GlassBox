[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "glassbox-numpandas"
version = "0.1.0"
description = "Core dataframe and IO package for GlassBox"
readme = "README.md"
requires-python = ">=3.11"
license = "MIT"
authors = [{ name = "GlassBox" }]
dependencies = [
  "numpy>=1.23",
  "openpyxl>=3.1",
]

[tool.setuptools]
package-dir = {"" = "src"}

[tool.setuptools.packages.find]
where = ["src"]
include = ["GlassBox.numpandas*"]
namespaces = true
