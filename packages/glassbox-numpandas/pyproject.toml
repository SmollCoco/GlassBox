[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[project]
name = "glassbox-numpandas"
version = "0.1.0"
description = "glassbox-numpandas package for the GlassBox ecosystem"
dependencies = ['numpy', 'openpyxl']

[tool.setuptools.packages.find]
where = ["src"]
