[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "glassbox-numpandas"
version = "0.1.1"
description = "glassbox-numpandas package for the GlassBox ecosystem"
readme = "README.md"
requires-python = ">=3.11"
license = "MIT"
authors = [{ name = "GlassBox" }]
dependencies = ["numpy", "openpyxl"]

[tool.setuptools]
package-dir = {"" = "src"}

[tool.setuptools.packages.find]
where = ["src"]
include = ["GlassBox.numpandas*"]
namespaces = true
