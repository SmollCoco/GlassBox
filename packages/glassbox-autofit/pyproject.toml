[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "glassbox-autofit"
version = "0.1.0"
description = "AutoML orchestration package for GlassBox"
readme = "README.md"
requires-python = ">=3.11"
license = "MIT"
authors = [{ name = "GlassBox" }]
dependencies = [
  "numpy>=1.23",
  "glassbox-numpandas>=0.1.0",
  "glassbox-eda>=0.1.0",
  "glassbox-preprocessing>=0.1.0",
  "glassbox-ml>=0.1.0",
  "glassbox-optimization>=0.1.0",
]

[tool.setuptools]
package-dir = {"" = "src"}

[tool.setuptools.packages.find]
where = ["src"]
include = ["GlassBox.autofit*"]
namespaces = true
