[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[project]
name = "glassbox-meta"
version = "0.1.1"
description = "Meta package for the GlassBox suite"
readme = "README.md"
requires-python = ">=3.11"
license = "MIT"
authors = [{ name = "GlassBox" }]
dependencies = [
  "glassbox-autofit>=0.1.1",
  "glassbox-benchmark>=0.1.1",
  "glassbox-numpandas>=0.1.1",
  "glassbox-eda>=0.1.1",
  "glassbox-preprocessing>=0.1.1",
  "glassbox-ml>=0.1.1",
  "glassbox-eval>=0.1.1",
  "glassbox-optimization>=0.1.1",
  "glassbox-pipeline>=0.1.1",
  "glassbox-split>=0.1.1",
]
