[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[project]
name = "glassbox-meta"
version = "0.1.0"
description = "Meta-package umbrella for the GlassBox ecosystem"
dependencies = ['glassbox-numpandas', 'glassbox-eda', 'glassbox-preprocessing', 'glassbox-ml', 'glassbox-split', 'glassbox-pipeline', 'glassbox-optimization', 'glassbox-benchmark']
