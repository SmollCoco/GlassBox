[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[project]
name = "glassbox-pipeline"
version = "0.1.0"
description = "glassbox-pipeline package for the GlassBox ecosystem"
dependencies = ['glassbox-numpandas', 'glassbox-preprocessing', 'glassbox-ml']

[tool.setuptools.packages.find]
where = ["src"]
