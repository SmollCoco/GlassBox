[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[project]
name = "glassbox-preprocessing"
version = "0.1.0"
description = "glassbox-preprocessing package for the GlassBox ecosystem"
dependencies = ['glassbox-numpandas', 'numpy']

[tool.setuptools.packages.find]
where = ["src"]
