[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[project]
name = "glassbox-eda"
version = "0.1.0"
description = "glassbox-eda package for the GlassBox ecosystem"
dependencies = ['glassbox-numpandas', 'numpy', 'matplotlib', 'seaborn']

[tool.setuptools.packages.find]
where = ["src"]
