[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[project]
name = "glassbox-optimization"
version = "0.1.0"
description = "glassbox-optimization package for the GlassBox ecosystem"
dependencies = ['glassbox-numpandas', 'glassbox-split', 'glassbox-pipeline']

[tool.setuptools.packages.find]
where = ["src"]
