name: GlassBox CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: glassbox-ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  quality-gates:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt
          python -m pip install -e packages/glassbox-numpandas
          python -m pip install -e packages/glassbox-preprocessing
          python -m pip install -e packages/glassbox-eda
          python -m pip install -e packages/glassbox-ml
          python -m pip install -e packages/glassbox-split
          python -m pip install -e packages/glassbox-optimization
          python -m pip install -e packages/glassbox-pipeline
          python -m pip install -e packages/glassbox-eval
          python -m pip install -e packages/glassbox-benchmark
          python -m pip install -e packages/glassbox-autofit
          python -m pip install -e packages/glassbox-meta
          python -m pip install -e .

      - name: Run lint checks
        run: |
          python -m ruff check .

      - name: Run type checks
        run: |
          python -m mypy agent packages/glassbox-*/src

      - name: Import smoke test
        run: |
          python - <<'PY'
          import sys

          sys.path.insert(0, "agent")

          import GlassBox.autofit
          import GlassBox.benchmark
          import GlassBox.eda
          import GlassBox.eval
          import GlassBox.ml
          import GlassBox.numpandas
          import GlassBox.optimization
          import GlassBox.pipeline
          import GlassBox.preprocessing
          import GlassBox.split
          import glassbox_tool
          import run_agent

          print("namespace-imports-ok")
          print(glassbox_tool.GLASSBOX_TOOL_SCHEMA["name"])
          print(run_agent.agent.name)
          PY

      - name: Run tests with coverage
        run: |
          python -m coverage run -m pytest
          python -m coverage report --fail-under=90

      - name: Build package
        run: |
          python -m build