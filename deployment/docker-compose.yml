version: '3.8'

services:
  fastapi:
    build: ./fastapi
    ports:
      - "8000:8000"
    networks:
      - glassbox_net

  n8n:
    image: docker.n8n.io/n8nio/n8n
    ports:
      - "5678:5678"
    environment:
      - N8N_HOST=0.0.0.0
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - NODE_ENV=production
    volumes:
      - n8n_data:/home/node/.n8n
    networks:
      - glassbox_net

networks:
  glassbox_net:

volumes:
  n8n_data:
